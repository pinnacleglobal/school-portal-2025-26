<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Portal</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f6fb;
}

/* HEADER */

.header{
background:#0b3d91;
color:white;
text-align:center;
padding:15px;
}

.logo{
height:60px;
}

/* LOGIN */

.login-box{
text-align:center;
padding:40px;
}

input{
padding:10px;
width:220px;
font-size:16px;
}

button{
padding:10px 20px;
background:#0b3d91;
color:white;
border:none;
cursor:pointer;
}

/* LOADER */

.loader{
display:none;
text-align:center;
padding:30px;
}

/* PROFILE */

.profile{
text-align:center;
background:white;
padding:20px;
margin:10px;
border-radius:10px;
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #ddd;
}

.student-name{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.details{
margin-top:10px;
font-size:16px;
}

/* GOLD HEADER */

.section-title{
background:#d4af37;
color:black;
padding:10px;
font-size:18px;
font-weight:bold;
margin:15px 10px 0 10px;
border-radius:6px 6px 0 0;
}

/* TABLE */

.table-container{
overflow-x:auto;
margin:0 10px 20px 10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#0b3d91;
color:white;
padding:10px;
font-size:14px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
font-size:14px;
text-align:center;
}

/* MOBILE CARD STYLE */

@media(max-width:600px){

table, thead{
display:none;
}

tbody tr{
display:block;
background:white;
margin-bottom:10px;
border-radius:8px;
padding:10px;
}

tbody td{
display:block;
text-align:left;
padding:6px 10px;
}

tbody td::before{
font-weight:bold;
display:block;
color:#0b3d91;
}

td:nth-child(1)::before{content:"Date";}
td:nth-child(2)::before{content:"Slip No";}
td:nth-child(3)::before{content:"Amount";}
td:nth-child(4)::before{content:"Fee Type";}
td:nth-child(5)::before{content:"Session";}
td:nth-child(6)::before{content:"Tuition Months";}
td:nth-child(7)::before{content:"Transport Months";}
td:nth-child(8)::before{content:"Exam Months";}

}

.logout{
text-align:center;
margin-bottom:30px;
}

</style>

</head>

<body>

<div class="header">

<img src="images/logo.png" class="logo">

<h2>Student Fee Portal</h2>

</div>


<div class="login-box" id="loginBox">

<h3>Student Login</h3>

<input type="text" id="admno" placeholder="Enter Admission Number">

<br><br>

<button onclick="login()">Login</button>

</div>


<div class="loader" id="loader">

Loading Student Data...

</div>


<div id="portal" style="display:none">

<div class="profile">

<img id="photo">

<div class="student-name" id="studentName"></div>

<div class="details" id="class"></div>

<div class="details" id="adm"></div>

<div class="details" id="father"></div>

<div class="details" id="mother"></div>

<div class="details" id="phone"></div>

<div class="details" id="address"></div>

</div>


<div class="section-title">

Fee Details

</div>


<div class="table-container">

<table>

<thead>

<tr>

<th>Date</th>
<th>Slip</th>
<th>Amount</th>
<th>Fee Type</th>
<th>Session</th>
<th>Tuition</th>
<th>Transport</th>
<th>Exam</th>

</tr>

</thead>

<tbody id="feeTable"></tbody>

</table>

</div>


<div class="logout">

<button onclick="logout()">Logout</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
