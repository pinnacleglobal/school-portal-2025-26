<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Portal</title>

<style>
body{
    font-family: Arial;
    margin: 0;
    background: #f2f5ff;
}

/* HEADER */
.header{
    background: #0b3d91;
    text-align: center;
    padding: 20px;
    color: white;
}

/* LOGO */
.logo{
    width: 140px;
    margin-bottom: 10px;
}

/* LOGIN */
.login-box{
    text-align: center;
    padding: 30px;
}

input{
    padding: 12px;
    width: 230px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

button{
    padding: 12px 25px;
    font-size: 16px;
    background: #0b3d91;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

button:disabled{
    background: gray;
}

/* LOADER */
.loader{
    display: none;
    text-align: center;
    padding: 20px;
    font-size: 18px;
}

/* PROFILE */
.profile{
    text-align: center;
    background: white;
    margin: 15px;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* PHOTO CIRCLE */
.photo-container{
    width: 130px;
    height: 130px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto;
    border: 4px solid #ddd;
    background: #f0f0f0;
    position: relative;
}

.photo-container img{
    width: 130px;
    height: 130px;
    object-fit: cover;
    display: block;
}

/* SPINNER INSIDE PHOTO */
#photoLoader{
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 12px;
    color: #0b3d91;
    display: none;
}

.student-name{
    font-size: 22px;
    font-weight: bold;
    margin-top: 10px;
}

.center-detail{
    font-size: 16px;
    margin-top: 4px;
}

.info{
    margin-top: 15px;
    font-size: 15px;
}

/* GOLD HEADER */
.section-title{
    background: #d4af37;
    color: black;
    padding: 12px;
    margin: 15px;
    border-radius: 6px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
}

/* TABLE */
.table-container{
    margin: 10px;
}

table{
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td{
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
    font-size: 14px;
}

th{
    background: #0b3d91;
    color: white;
}

tbody tr:nth-child(even){
    background-color: #e6f0ff;
}

/* MOBILE: Fee cards */
@media(max-width:600px){
    table thead{
        display: none;
    }
    tbody tr.fee-card{
        display: block;
        background: #e6f0ff;
        margin-bottom: 14px;
        padding: 14px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        border: 1px solid #ccc;
    }
    tbody tr.fee-card:nth-child(even){
        background: #d9e8ff;
    }
    tbody td{
        display: block;
        text-align: left;
        padding: 8px 10px;
        border: none;
        font-size: 14px;
    }
    tbody td::before{
        font-weight: bold;
        display: block;
        color: #0b3d91;
        margin-bottom: 4px;
    }
    td:nth-child(1)::before { content: "Date"; }
    td:nth-child(2)::before { content: "Slip No."; }
    td:nth-child(3)::before { content: "Amount"; }
    td:nth-child(4)::before { content: "Fee Type"; }
    td:nth-child(5)::before { content: "Session"; }
    td:nth-child(6)::before { content: "Tuition Months"; }
    td:nth-child(7)::before { content: "Transport Months"; }
    td:nth-child(8)::before { content: "Exam Months"; }
}

.logout{
    text-align: center;
    margin: 20px;
}
</style>
</head>

<body>

<div class="header">
    <img src="images/logo.png" class="logo">
    <h2>Student Fee Portal</h2>
</div>

<div class="login-box" id="loginBox">
    <h3>Student Login</h3>
    <input type="text" id="loginCode" placeholder="Enter Login Code">
    <br><br>
    <button id="loginBtn" onclick="login()">Login</button>
</div>

<div class="loader" id="loader">
    Loading Student Data...
</div>

<div id="portal" style="display:none">
    <div class="profile">
        <div class="photo-container">
            <img id="photo" src="images/default.png">
            <div id="photoLoader">Loading...</div>
        </div>
        <div class="student-name" id="studentName"></div>
        <div class="center-detail" id="class"></div>
        <div class="center-detail" id="adm"></div>
        <div class="info" id="father"></div>
        <div class="info" id="mother"></div>
        <div class="info" id="phone"></div>
        <div class="info" id="address"></div>
    </div>

    <div class="section-title">
        Fee Details
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Slip No.</th>
                    <th>Amount</th>
                    <th>Fee Type</th>
                    <th>Session</th>
                    <th>Tuition</th>
                    <th>Transport</th>
                    <th>Exam</th>
                </tr>
            </thead>
            <tbody id="feeTable"></tbody>
        </table>
    </div>

    <div class="logout">
        <button onclick="logout()">Logout</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
