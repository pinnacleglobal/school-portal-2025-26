<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

.logo{
width:110px;
margin-bottom:10px;
}

input{
padding:12px;
width:250px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

button{
padding:12px 25px;
background:#007BFF;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.hidden{
display:none;
}

/* TABLE */

.table-wrapper{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:850px;
}

th,td{
border:1px solid #2a5db0;
padding:8px;
text-align:center;
font-size:14px;
}

th{
background:#2a5db0;
color:white;
}

.titleRow{
background:#004aad;
color:white;
font-weight:bold;
font-size:18px;
text-align:center;
}

/* MOBILE CARD VIEW */

.card-container{
display:none;
}

.fee-card{
background:white;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
padding:15px;
margin-top:15px;
text-align:left;
}

.fee-card b{
color:#004aad;
}

/* LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.8);
display:none;
justify-content:center;
align-items:center;
}

.spinner{
border:6px solid #f3f3f3;
border-top:6px solid #007BFF;
border-radius:50%;
width:50px;
height:50px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* MOBILE SWITCH */

@media(max-width:700px){

.table-wrapper{
display:none;
}

.card-container{
display:block;
}

.container{
margin:10px;
}

input{
width:90%;
}

}

</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->

<div id="loginPage">

<img src="images/logo.png" class="logo">

<h2>Student Portal</h2>

<input id="code" placeholder="Enter Login Code">

<br>

<button onclick="login()">Login</button>

<p id="msg" style="color:red"></p>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="hidden">

<img src="images/logo.png" class="logo">

<h2 id="welcome"></h2>

<p><b>Admission Number:</b> <span id="admission"></span></p>
<p><b>Class:</b> <span id="class"></span></p>

<!-- DESKTOP TABLE -->

<div class="table-wrapper">

<table>

<tr class="titleRow">
<td colspan="9">📊 Fee Details</td>
</tr>

<tr>
<th>Date</th>
<th>Slip Number</th>
<th>Fee Deposited</th>
<th>Fee Type</th>
<th>Session</th>
<th>Tuition Fee Months</th>
<th>Transport Fee Months</th>
<th>Exam Fee Months</th>
<th>Payment Mode</th>
</tr>

<tbody id="feesTable"></tbody>

</table>

</div>

<!-- MOBILE CARDS -->

<div id="cardContainer" class="card-container"></div>

<br>

<button onclick="logout()">Logout</button>

</div>

</div>

<div id="loader">
<div class="spinner"></div>
</div>

<script src="script.js"></script>

</body>
</html>
