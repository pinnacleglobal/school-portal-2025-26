<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Fee Portal</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" sizes="32x32" href="images/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/logo.png">
<link rel="apple-touch-icon" href="images/logo.png">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f5ff;
}

/* HEADER */

.header{
background:#0b3d91;
text-align:center;
padding:20px;
color:white;
}

.logo{
width:140px;
margin-bottom:10px;
}

/* LOGIN */

.login-box{
text-align:center;
padding:30px;
}

input{
padding:12px;
width:230px;
font-size:16px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:12px 25px;
font-size:16px;
background:#0b3d91;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:disabled{
background:gray;
}

/* LOADER */

.loader{
display:none;
text-align:center;
padding:20px;
font-size:18px;
}

/* PROFILE */

.profile{
text-align:center;
background:white;
margin:15px;
padding:25px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.student-name{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.info{
font-size:15px;
margin:6px 0;
}

/* SECTION TITLE */

.section-title{
background:#d4af37;
color:black;
padding:12px;
margin:15px;
border-radius:6px;
font-size:18px;
font-weight:bold;
text-align:center;
}

/* TABLE */

.table-container{
margin:15px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th, td{
border:1px solid #ddd;
padding:10px;
text-align:center;
font-size:14px;
}

th{
background:white;
color:black;
font-weight:bold;
}

tr:nth-child(even){
background:#e8f1ff;
}

/* MOBILE CARDS */

.fee-cards{
display:none;
padding:15px;
}

.fee-card{
background:white;
border-radius:12px;
padding:16px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.12);
}

.fee-card div{
margin:5px 0;
font-size:14px;
}

/* MOBILE VIEW */

@media(max-width:600px){

.table-container{
display:none;
}

.fee-cards{
display:block;
}

}

.logout{
text-align:center;
margin:20px;
}

</style>

</head>

<body>

<div class="header">

<img src="images/logo.png" class="logo">

<h2>Student Fee Portal</h2>

</div>

<div class="login-box" id="loginBox">

<h3>Student Login</h3>

<input type="text" id="loginCode" placeholder="Enter Login Code">

<br><br>

<button id="loginBtn" onclick="login()">Login</button>

</div>

<div class="loader" id="loader">
Loading Student Data...
</div>

<div id="portal" style="display:none">

<div class="profile">

<div class="student-name" id="studentName"></div>

<div class="info" id="class"></div>
<div class="info" id="adm"></div>
<div class="info" id="father"></div>
<div class="info" id="mother"></div>
<div class="info" id="phone"></div>
<div class="info" id="address"></div>

</div>

<div class="section-title">
Fee Details
</div>

<!-- DESKTOP TABLE -->

<div class="table-container">

<table>

<thead>
<tr>
<th>Date</th>
<th>Slip No</th>
<th>Amount</th>
<th>Fee Type</th>
<th>Session</th>
<th>Tuition</th>
<th>Transport</th>
<th>Exam</th>
</tr>
</thead>

<tbody id="feeTable"></tbody>

</table>

</div>

<!-- MOBILE CARDS -->

<div class="fee-cards" id="feeCards"></div>

<div class="logout">
<button onclick="logout()">Logout</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
